<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 達和[新店廠]旅遊揪團情報站</title>
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<style>
  /* 基礎排版與字體 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  body { font-family: 'Noto Sans TC', sans-serif; background-color: transparent; margin: 0; padding: 0; color: #2d3748; overflow-x: hidden; }
  
  /* 頁首設計 (Header) */
  .site-header { text-align: center; padding: 25px 15px 15px 15px; background: #ffffff; }
  .site-header h1 { font-size: 1.5em; color: #1a202c; margin: 0; font-weight: 900; letter-spacing: 0.5px; }

  /* 單行橫向滑動導航列 */
  .sticky-nav {
    position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
    z-index: 100; padding: 12px 10px; display: flex; flex-wrap: nowrap; overflow-x: auto; 
    -webkit-overflow-scrolling: touch; justify-content: flex-start; gap: 8px; 
    border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; -ms-overflow-style: none; scrollbar-width: none;
  }
  .sticky-nav::-webkit-scrollbar { display: none; }
  
  /* 主揪專屬發起按鈕 */
  .nav-btn-special {
    padding: 6px 16px; background: #226b80; border-radius: 15px; color: #ffffff; font-weight: 900;
    white-space: nowrap; font-size: 0.85em; text-decoration: none; display: inline-flex; align-items: center; 
    flex-shrink: 0; box-shadow: 0 2px 6px rgba(34, 107, 128, 0.4); transition: all 0.2s;
  }
  .nav-btn-special:hover { background: #1a5363; transform: translateY(-1px); }

  /* 一般月份導航按鈕 */
  .nav-btn {
    padding: 6px 14px; background: #edf2f7; border-radius: 15px; color: #4a5568;
    font-weight: 700; white-space: nowrap; transition: all 0.2s; font-size: 0.85em; cursor: pointer; border: none; flex-shrink: 0;
  }
  .nav-btn:hover, .nav-btn.active { background: #2d3748; color: #ffffff; }

  /* 折疊區塊 (Accordion) */
  details { margin: 0 10px 25px 10px; background: #ffffff; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); border: 1px solid #edf2f7; scroll-margin-top: 100px; }
  summary { padding: 15px 20px; font-size: 1.2em; font-weight: 900; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; color: #1a202c; }
  summary::-webkit-details-marker { display: none; }
  summary::after { content: '▼'; font-size: 0.7em; color: #a0aec0; transition: transform 0.3s; }
  details[open] summary::after { transform: rotate(180deg); }
  details[open] summary { border-bottom: 1px dashed #e2e8f0; }
  .details-content { padding: 15px; }

  /* 卡片網格佈局 */
  .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

  /* 卡片設計 */
  .card {
    background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    overflow: hidden; display: flex; flex-direction: column; border: 1px solid #f0f0f0;
    transition: transform 0.2s ease; width: 100%; max-width: 100%; margin: 0 auto; box-sizing: border-box;
  }
  .card:hover { transform: translateY(-5px); }
  .card-img { height: 160px; background-size: cover; background-position: center; position: relative; }
  .badge { position: absolute; top: 12px; right: 12px; padding: 6px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 700; color: white; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .status-green { background: rgba(40, 167, 69, 0.9); }
  .status-orange { background: rgba(255, 152, 0, 0.9); color: #fff;}
  .status-red { background: rgba(220, 53, 69, 0.9); }
  .status-blue { background: rgba(0, 123, 255, 0.9); }

  .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
  .agency-tag { font-size: 0.75em; color: #6c757d; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
  .title { font-size: 1.15em; font-weight: 900; margin: 0 0 12px 0; line-height: 1.3; }

  /* 左右雙欄佈局 */
  .info-action-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; margin-bottom: 15px; }
  .info-col { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
  .details-text { font-size: 0.85em; color: #4a5568; line-height: 1.6; margin: 0; }
  .price-side-block { margin-top: 4px; }
  .side-price-value { font-size: 1.5em; font-weight: 900; color: #e53e3e; margin: 0; line-height: 1; }
  .side-price-unit { font-size: 0.6em; color: #718096; }

  /* 右側按鈕 */
  .action-col { display: flex; flex-direction: column; gap: 6px; width: 85px; flex-shrink: 0; }
  .btn { 
    width: 100%; text-align: center; padding: 7px 0; border-radius: 6px; text-decoration: none; 
    font-size: 0.8em; font-weight: 700; cursor: pointer; box-sizing: border-box; 
    transition: all 0.2s; border: 1px solid transparent; line-height: 1.2;
  }
  .btn-primary { background: #2d3748; color: #ffffff; }
  .btn-primary:hover { background: #1a202c; }
  .btn-secondary { background: transparent; color: #2d3748; border: 1px solid #cbd5e0; }
  .btn-secondary:hover { background: #f7fafc; }
  .btn-line { background: #06C755; color: #ffffff; }
  .btn-line:hover { background: #05a546; }
  .btn:disabled, .btn.disabled { background: #a0aec0; color: #fff; pointer-events: none; opacity: 0.7; }

  /* 進度條與微型標籤 */
  .progress-section { margin-top: auto; padding-top: 12px; border-top: 1px dashed #e2e8f0; }
  .progress-bar-bg { background: #edf2f7; border-radius: 10px; height: 6px; width: 100%; margin-bottom: 6px; overflow: hidden;}
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #4299e1 0%, #3182ce 100%); transition: width 0.5s ease-in-out;}
  .progress-fill.full { background: #e53e3e; }
  .stats { display: flex; justify-content: space-between; align-items: center; font-size: 0.75em; color: #718096; font-weight: 700; }
  .stat-left { display: flex; align-items: center; gap: 6px; }
  .emp-badge { background: #f7fafc; color: #4a5568; padding: 2px 6px; border-radius: 6px; font-size: 0.85em; display: inline-flex; align-items: center; border: 1px solid #e2e8f0; font-weight: 700; }

  .highlight-section { border: 2px solid #ff9800; background: #fffaf0; }
  .highlight-section summary { color: #e65100; font-size: 1.1em; }
  .highlight-section summary::before { content: '🔥 '; }
  .loader { text-align: center; padding: 40px; font-size: 1.1em; color: #4a5568; font-weight: 700; }

  /* 頁尾設計 (Footer) */
  .site-footer {
    margin-top: 40px; padding: 30px 20px; background: #f8fafc; border-top: 1px solid #e2e8f0;
    color: #718096; font-size: 0.85em; line-height: 1.8; text-align: center;
  }
  .site-footer h4 { color: #4a5568; margin: 0 0 10px 0; font-size: 1.1em; }
  .site-footer p { margin: 0 auto; max-width: 800px; }
</style>
</head>
<body>

<header class="site-header">
  <h1>2026 達和[新店廠]旅遊揪團情報站</h1>
</header>

<div id="nav-container" class="sticky-nav" style="display: none;"></div>
<div id="loader" class="loader">✈️ 正在彙整達和旅遊型錄...</div>
<div id="main-content"></div>

<footer class="site-footer">
  <h4>🚩 關於 達和跨單位旅遊揪團情報站</h4>
  <p>本站為同仁自主發起之內部資訊交流平台，非達和官方正式建置之網站。站內所有行程資訊均由各單位主揪即時發佈與自主維護，實際報名狀況與最終優惠價請以主揪回覆為準。提醒您，發起或參與各項揪團活動，請務必依循公司相關規範與決策程序辦理。歡迎多加利用本平台，輕鬆探索跨單位交流機會！</p>
</footer>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbx1985s2s5ICLAu2UUuG_H72Ixk5iTJmv77v0TLeYOxs-rHOgERoSaC0WDWiemHbENE_Q/exec';
  const CACHE_KEY = 'zappos_travel_data_v9'; // 🔥 更新為 v9
  const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfttLnyQ8kE-qswLfN55T-obsHWJ5ev_o3o7cu8pUOVRnHQMA/viewform';

  async function fetchTravelData() {
    const loader = document.getElementById('loader');
    const cachedData = localStorage.getItem(CACHE_KEY);
    
    if (cachedData) {
      loader.innerHTML = '<span style="font-size:0.8em; color:#a0aec0;">🔄 核對最新名額中...</span>';
      loader.style.padding = '10px';
      processAndRender(JSON.parse(cachedData)); 
    } else {
      loader.innerHTML = '✈️ 正在彙整達和旅遊型錄...';
    }

    try {
      const response = await fetch(API_URL);
      const freshData = await response.json();
      localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));
      loader.style.display = 'none';
      processAndRender(freshData);
    } catch (error) {
      if (!cachedData) loader.innerHTML = '⚠️ 載入失敗，請確認 API 網址是否正確。';
      else { loader.style.display = 'none'; console.error('背景同步失敗', error); }
    }
  }

  function scrollToSection(sectionId) {
    const targetElement = document.getElementById(sectionId);
    if (targetElement) {
      targetElement.setAttribute('open', ''); 
      const headerOffset = 140; 
      const elementPosition = targetElement.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
      window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
    }
  }

  function processAndRender(trips) {
    if (!trips || trips.length === 0) {
      document.getElementById('main-content').innerHTML = '<div style="text-align:center; padding: 40px; color:#a0aec0;">目前沒有行程喔！🌱</div>';
      return;
    }

    trips.sort((a, b) => {
      let dateA = new Date(a.startDate).getTime() || 0;
      let dateB = new Date(b.startDate).getTime() || 0;
      if (dateA !== dateB) return dateA - dateB; 
      let timeA = new Date(a.timestamp).getTime() || 0;
      let timeB = new Date(b.timestamp).getTime() || 0;
      return timeA - timeB; 
    });

    let groupedTrips = { "🔥 最後上車機會": [] }; 
    trips.forEach(trip => {
      if (trip.remaining > 0 && trip.remaining <= 3 && !trip.status.includes('額滿')) {
        groupedTrips["🔥 最後上車機會"].push(trip);
      }
      let monthKey = "待定行程";
      if (trip.startDate) {
        let d = new Date(trip.startDate);
        monthKey = `${String(d.getMonth() + 1).padStart(2, '0')}月`; // 只顯示月份
      }
      if (!groupedTrips[monthKey]) groupedTrips[monthKey] = [];
      groupedTrips[monthKey].push(trip);
    });

    const navContainer = document.getElementById('nav-container');
    const mainContent = document.getElementById('main-content');
    
    let navHtml = `<a href="${FORM_URL}" target="_blank" class="nav-btn-special">📝 發起揪團</a>`;
    let contentHtml = '';

    for (const [groupName, groupTrips] of Object.entries(groupedTrips)) {
      if (groupTrips.length === 0) continue; 
      let isHighlight = groupName === "🔥 最後上車機會";
      let sectionId = 'sec-' + groupName.replace(/\s+/g, '-');
      
      navHtml += `<button onclick="scrollToSection('${sectionId}')" class="nav-btn">${groupName.replace('🔥 ', '')}</button>`;
      let openAttr = isHighlight ? 'open' : ''; 
      let highlightClass = isHighlight ? 'highlight-section' : '';

      contentHtml += `
        <details id="${sectionId}" class="${highlightClass}" ${openAttr}>
          <summary>${groupName} <span style="font-size:0.65em; color:#a0aec0; font-weight:normal; margin-left:10px;">共 ${groupTrips.length} 團</span></summary>
          <div class="details-content">
            <div class="grid-container">
      `;
      groupTrips.forEach(trip => { contentHtml += createCardHTML(trip); });
      contentHtml += `</div></div></details>`;
    }

    navContainer.innerHTML = navHtml;
    navContainer.style.display = 'flex';
    mainContent.innerHTML = contentHtml;

    let detailsBlocks = mainContent.querySelectorAll('details:not(.highlight-section)');
    if(detailsBlocks.length > 0) detailsBlocks[0].setAttribute('open', '');
  }

  function createCardHTML(trip) {
    let formattedPrice = '';
    if (trip.price && Number(trip.price) > 0) formattedPrice = Number(trip.price).toLocaleString('zh-TW');

    let percent = trip.maxCapacity > 0 ? Math.min((trip.currentTotal / trip.maxCapacity) * 100, 100) : 0;
    
    let badgeClass = 'status-blue';
    if (trip.status.includes('額滿') || trip.status.includes('暫停')) badgeClass = 'status-red';
    else if (trip.status.includes('成團') || trip.status.includes('保證')) badgeClass = 'status-green';
    else if (trip.status.includes('即將滿團') || trip.status.includes('差一點')) badgeClass = 'status-orange';

    let isFull = trip.status.includes('額滿') || trip.status.includes('暫停');
    let btnClass = isFull ? 'btn-primary disabled' : 'btn-primary';
    let btnText = isFull ? '已截止' : '💌 詢問'; 

    // 🔥 全新邏輯：判斷是 Email 還是 網址連結
    let isContactUrl = /^https?:\/\//i.test(trip.contact);
    let inquireHref = isContactUrl ? trip.contact : `mailto:${trip.contact}?subject=詢問達和內部旅遊報價：${trip.shortTitle}`;
    let inquireTarget = isContactUrl ? `target="_blank"` : ``;

    let lineBtnHtml = '';
    if (trip.lineGroup && !trip.lineGroup.includes('不用')) {
        let httpMatch = trip.lineGroup.match(/https?:\/\/[^\s]+/);
        if (httpMatch) lineBtnHtml = `<a href="${httpMatch[0]}" target="_blank" class="btn btn-line">💬 LINE</a>`;
        else lineBtnHtml = `<button onclick="alert('LINE 聯絡資訊：\\n${trip.lineGroup}')" class="btn btn-line">💬 LINE</button>`;
    }

    return `
      <div class="card">
        <div class="card-img" style="background-image: url('${trip.image}');">
          <span class="badge ${badgeClass}">${trip.status}</span>
        </div>
        <div class="card-body">
          <div class="agency-tag">🚩 ${trip.agency} | 📍 ${trip.location} | 👤 主揪：${trip.organizer || '未提供'}</div>
          <h3 class="title">${trip.shortTitle || trip.title}</h3>
          
          <div class="info-action-row">
            <div class="info-col">
              <div class="details-text">
                📅 出發：${trip.startDate}<br>
                📅 回程：${trip.endDate}
              </div>
              ${formattedPrice ? `
                <div class="price-side-block">
                  <p class="side-price-value">$ ${formattedPrice}</p>
                  <span class="side-price-unit">參考價/起</span>
                </div>
              ` : ''}
            </div>

            <div class="action-col">
              <a href="${trip.link}" target="_blank" class="btn btn-secondary">🔍 行程</a>
              <a href="${inquireHref}" ${inquireTarget} class="btn ${btnClass}">${btnText}</a>
              ${lineBtnHtml}
            </div>
          </div>

          <div class="progress-section">
            <div class="progress-bar-bg">
              <div class="progress-fill ${isFull ? 'full' : ''}" style="width: ${percent}%;"></div>
            </div>
            <div class="stats">
              <div class="stat-left">
                <span>目前：${trip.currentTotal} 人</span>
                ${trip.empCount > 0 ? `<span class="emp-badge">👤 員工 ${trip.empCount}</span>` : ''}
              </div>
              <span>剩餘：${trip.remaining > 0 ? trip.remaining : 0} 席</span>
            </div>
          </div>

        </div>
      </div>
    `;
  }

  window.onload = fetchTravelData;
</script>
</body>
</html>
